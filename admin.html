<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - Tatis Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:#f3f3f3;
    color:#111;
}

header{
    background:black;
    padding:20px 60px;
    color:white;
}

.logo{
    font-family:'Playfair Display', serif;
    font-size:22px;
    letter-spacing:2px;
}

h1{
    text-align:center;
    margin:60px 0;
    font-family:'Playfair Display', serif;
    letter-spacing:4px;
}

.container{
    width:80%;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:6px;
}

.pedido{
    border-bottom:1px solid #eee;
    padding:20px 0;
}
</style>
</head>

<body>

<header>
<div class="logo">TATIS SHOP - ADMIN</div>
</header>

<h1>PEDIDOS</h1>

<div class="container" id="listaPedidos"></div>

<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
let lista = document.getElementById("listaPedidos");

if(pedidos.length === 0){
    lista.innerHTML = "No hay pedidos aún.";
}else{

    pedidos.forEach(pedido=>{

        lista.innerHTML += `
        <div class="pedido">
            <strong>Cliente:</strong> ${pedido.cliente}<br>
            <strong>Método:</strong> ${pedido.metodo}<br>
            <strong>Total:</strong> $${pedido.total}<br>
            <strong>Fecha:</strong> ${pedido.fecha}
        </div>
        `;
    });
}

</script>

</body>
</html>
