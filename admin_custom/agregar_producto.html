{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .admin-form-container {
        max-width: 900px;
        margin: 60px auto;
        background: #fff;
        padding: 40px;
        border: 1px solid #eee;
        box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    }

    .form-title {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 40px;
        text-align: center;
        border-bottom: 1px solid #000;
        padding-bottom: 15px;
        display: inline-block;
        width: 100%;
    }

    .form-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
        color: #555;
        margin-bottom: 8px;
    }

    .form-control, .form-select {
        border-radius: 0;
        border: 1px solid #ccc;
        padding: 12px;
        font-size: 14px;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #000;
        box-shadow: none;
        background-color: #fcfcfc;
    }

    .image-preview-zone {
        width: 100%;
        height: 250px;
        border: 2px dashed #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #888;
        cursor: pointer;
        transition: 0.3s;
        margin-bottom: 15px;
    }

    .image-preview-zone:hover {
        border-color: #000;
        color: #000;
    }

    .btn-save {
        background: #000;
        color: #fff;
        border: none;
        padding: 15px 40px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 13px;
        font-weight: 600;
        width: 100%;
        transition: 0.3s;
        margin-top: 20px;
    }

    .btn-save:hover {
        background: #333;
        letter-spacing: 4px;
    }

    .input-group-text {
        background: #f8f8f8;
        border-radius: 0;
        border: 1px solid #ccc;
    }
</style>

<div class="container">
    <div class="admin-form-container">
        <h2 class="form-title">Nuevo Producto</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-7">
                    <div class="mb-4">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Blazer Negro Premium" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Descripción Detallada</label>
                        <textarea name="descripcion" class="form-control" rows="6" placeholder="Describe el material, corte y estilo..." required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Precio (MXN)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="precio" class="form-control" placeholder="0.00" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Stock Inicial</label>
                            <input type="number" name="stock" class="form-control" placeholder="Cantidad" required>
                        </div>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="mb-4">
                        <label class="form-label">Imagen de Portada</label>
                        <label for="id_imagen" class="image-preview-zone" id="drop-zone">
                            <i class="bi bi-cloud-arrow-up fs-1"></i>
                            <span class="mt-2" id="file-name">Subir Imagen</span>
                            <input type="file" name="imagen" id="id_imagen" hidden accept="image/*" required>
                        </label>
                        <div id="preview-container" class="text-center" style="display:none;">
                            <img id="image-preview" src="#" alt="Vista previa" style="max-width: 100%; max-height: 200px; border: 1px solid #eee;">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Categoría</label>
                        <select name="categoria" class="form-select" required>
                            <option value="" selected disabled>Seleccionar...</option>
                            {% for cat in categorias %}
                                <option value="{{ cat.id_categoria }}">{{ cat.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Estado</label>
                        <div class="form-check form-switch mt-2">
                            <input class="form-check-input" type="checkbox" name="activo" id="activo" checked>
                            <label class="form-check-label" for="activo" style="font-size: 12px;">Producto Visible en Tienda</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-4">
                    <a href="{% url 'dashboard_admin' %}" class="btn btn-outline-secondary w-100 rounded-0 p-3 text-uppercase" style="font-size: 12px; letter-spacing: 1px;">
                        Cancelar
                    </a>
                </div>
                <div class="col-md-8">
                    <button type="submit" class="btn btn-save">Guardar Producto</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    const inputImagen = document.getElementById('id_imagen');
    const previewZone = document.getElementById('drop-zone');
    const previewImg = document.getElementById('image-preview');
    const previewContainer = document.getElementById('preview-container');
    const fileNameText = document.getElementById('file-name');

    inputImagen.onchange = evt => {
        const [file] = inputImagen.files;
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewZone.style.display = 'none';
            previewContainer.style.display = 'block';
            fileNameText.innerText = file.name;
        }
    }
</script>
{% endblock %}
