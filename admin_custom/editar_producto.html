{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .edit-form-wrapper {
        max-width: 700px;
        margin: 60px auto;
        background: #ffffff;
        padding: 50px;
        border: 1px solid #f0f0f0;
        box-shadow: 0 15px 40px rgba(0,0,0,0.03);
    }
    .form-header h2 {
        font-family: 'Playfair Display', serif;
        text-transform: uppercase;
        letter-spacing: 4px;
        text-align: center;
    }
    .form-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 700;
        color: #333;
    }
    .form-control-custom {
        width: 100%;
        border: none;
        border-bottom: 1px solid #ccc;
        padding: 10px 0;
        border-radius: 0;
        margin-bottom: 25px;
        transition: 0.4s;
    }
    .form-control-custom:focus {
        outline: none;
        border-bottom-color: #000;
    }
    .btn-update {
        background: #000;
        color: #fff;
        padding: 15px;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 600;
        border: none;
        transition: 0.3s;
    }
    .btn-update:hover { background: #333; }
    .current-img { width: 100px; border-radius: 8px; margin-bottom: 10px; }

    /* Estilo para el Checkbox de Visibilidad */
    .visibility-wrapper {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        cursor: pointer;
    }
    .visibility-wrapper input {
        width: 18px;
        height: 18px;
        margin-right: 12px;
        cursor: pointer;
        accent-color: #000;
    }
</style>

<div class="container">
    <div class="edit-form-wrapper">
        <div class="form-header mb-5">
            <h2>Editar Producto</h2>
            <p class="text-center text-muted small uppercase">ID: #{{ producto.id_producto }}</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label class="form-label">Nombre del Producto</label>
            <input type="text" name="nombre" class="form-control-custom" value="{{ producto.nombre }}" required>

            <label class="form-label">Descripción</label>
            <textarea name="descripcion" class="form-control-custom" rows="3">{{ producto.descripcion }}</textarea>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Precio (MXN)</label>
                    <input type="number" step="0.01" name="precio" class="form-control-custom" value="{{ producto.precio }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Stock Actual</label>
                    <input type="number" name="stock" class="form-control-custom" value="{{ producto.stock }}" required>
                </div>
            </div>

            <label class="form-label">Categoría</label>
            <select name="categoria" class="form-control-custom" required>
                {% for cat in categorias %}
                <option value="{{ cat.id_categoria }}" {% if cat == producto.id_categoria %}selected{% endif %}>
                    {{ cat.nombre }}
                </option>
                {% endfor %}
            </select>

            <label class="form-label">Imagen del Producto</label>
            <div class="mb-4">
                {% if producto.imagen %}
                    <img src="{{ producto.imagen.url }}" class="current-img d-block">
                {% endif %}
                <input type="file" name="imagen" class="form-control form-control-sm rounded-0">
            </div>

            <div class="visibility-wrapper">
                <input type="checkbox" name="disponible" id="id_disponible" {% if producto.disponible %}checked{% endif %}>
                <label for="id_disponible" class="form-label m-0" style="cursor: pointer;">
                    Mostrar este producto en la tienda al público
                </label>
            </div>

            <button type="submit" class="btn-update mt-2">Guardar Cambios</button>
            <a href="{% url 'dashboard_admin' %}" class="d-block text-center mt-4 text-muted small text-decoration-none">CANCELAR</a>
        </form>
    </div>
</div>
{% endblock %}
