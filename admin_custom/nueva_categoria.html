{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Contenedor principal con estética minimalista */
    .category-form-wrapper {
        max-width: 500px;
        margin: 80px auto;
        background: #ffffff;
        padding: 50px;
        border: 1px solid #f0f0f0;
        box-shadow: 0 15px 40px rgba(0,0,0,0.03);
    }

    .form-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .form-header h2 {
        font-family: 'Playfair Display', serif;
        font-size: 30px;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: #000;
        margin-bottom: 10px;
    }

    .form-header .subtitle {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #888;
    }

    /* Estilización de inputs */
    .form-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 700;
        color: #333;
        margin-bottom: 12px;
        display: block;
    }

    .form-control-custom {
        width: 100%;
        border: none;
        border-bottom: 1px solid #ccc;
        padding: 12px 0;
        font-size: 16px;
        border-radius: 0;
        transition: all 0.4s ease;
        background: transparent;
    }

    .form-control-custom:focus {
        outline: none;
        border-bottom-color: #000;
        background-color: transparent;
    }

    /* Botón de guardar estilo Luxury */
    .btn-save-category {
        background: #000;
        color: #fff;
        border: 1px solid #000;
        padding: 16px;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 30px;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .btn-save-category:hover {
        background: #fff;
        color: #000;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 25px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #999;
        text-decoration: none;
        transition: 0.3s;
    }

    .back-link:hover {
        color: #000;
    }
</style>

<div class="container">
    <div class="category-form-wrapper">
        <div class="form-header">
            <h2>Categoría</h2>
            <p class="subtitle">Gestión de Inventario Tatis Shop</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-5">
                <label class="form-label">Nombre del Segmento</label>
                <input type="text" name="nombre" class="form-control-custom" 
                       placeholder="Ej: Colección Otoño" required autofocus>
            </div>

            <button type="submit" class="btn-save-category">
                Confirmar y Registrar
            </button>

            <a href="{% url 'dashboard_admin' %}" class="back-link">
                <i class="bi bi-chevron-left me-1"></i> Volver al Panel
            </a>
        </form>
    </div>
</div>
{% endblock %}
